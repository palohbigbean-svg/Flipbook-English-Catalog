<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The BIG Bean® | 大粒咖啡 - 产品目录 2026</title>

    <!-- Open Graph Meta Tags for Social Sharing -->
    <!-- When shared on WhatsApp/Facebook, it will use page1.jpg as the thumbnail -->
    <meta property="og:title" content="The BIG Bean® | 大粒咖啡 2026产品目录" />
    <meta property="og:description" content="最好的咖啡，是你喜欢的味道！浏览 The BIG Bean 大粒咖啡最新产品目录。" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="page1.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="page1.jpg" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #2c1e16;
            background-image: radial-gradient(circle at center, #4a3424 0%, #1a0f0a 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Flipbook Container */
        #flipbook-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 2500px;
            overflow: hidden;
        }

        #zoom-pan-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform-origin: center center;
            transition: transform 0.3s ease;
            cursor: default;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #zoom-pan-container.zoomed {
            cursor: grab;
        }

        #zoom-pan-container.zoomed.dragging {
            cursor: grabbing;
            transition: none; /* Disable transition during drag for 1:1 movement */
        }

        /* The Book Element */
        #flipbook {
            position: relative;
            transform-style: preserve-3d;
        }

        /* --- RESPONSIVE SIZING & ASPECT RATIO (Prevents Cropping) --- */
        
        /* Mobile Portrait: 1 Page (A4 Portrait Ratio ~ 1 / 1.414) */
        @media (max-aspect-ratio: 8/5) {
            #flipbook {
                width: 85vw;
                height: 85vh;
                max-width: calc(85vh * 0.707);
                max-height: calc(85vw * 1.414);
            }
            .leaf {
                width: 100%;
                height: 100%;
                left: 0;
                transform-origin: center center; /* Flip from center for single page */
            }
        }

        /* Desktop & Mobile Landscape: 2 Pages (Spread Ratio ~ 1.414) */
        @media (min-aspect-ratio: 8/5) {
            #flipbook {
                width: 90vw;
                height: 90vh;
                max-width: calc(90vh * 1.414);
                max-height: calc(90vw * 0.707);
            }
            .leaf {
                width: 50%;
                height: 100%;
                left: 50%; /* Leaves start on the right side */
                transform-origin: left center; /* Hinge on the spine */
            }
        }

        /* --- LEAF (SHEET) STRUCTURE --- */
        .leaf {
            position: absolute;
            top: 0;
            transform-style: preserve-3d;
            transition: transform 0.9s cubic-bezier(0.645, 0.045, 0.355, 1);
            z-index: 1;
        }

        .leaf.flipped {
            transform: rotateY(-180deg);
        }

        .page-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            background-color: #fff;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Front face is standard */
        .page-face.front {
            transform: rotateY(0deg);
        }

        /* Back face is pre-rotated 180deg so it acts as the reverse side of the sheet */
        .page-face.back {
            transform: rotateY(180deg);
        }

        .page-face img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* CRITICAL: Prevents cropping */
            pointer-events: none;
        }

        /* Bottom Toolbar */
        #toolbar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 1000;
        }

        .btn {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 20px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn svg {
            width: 24px;
            height: 24px;
            fill: #fff;
        }

        /* Loading Indicator */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a0f0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            transition: opacity 0.5s ease;
        }

        #loader.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.2);
            border-top-color: #d4a373;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #loader p {
            color: #d4a373;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .swipe-hint {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            text-align: center;
            animation: fadeOut 5s forwards;
            pointer-events: none;
        }

        @keyframes fadeOut {
            0%, 70% { opacity: 1; }
            100% { opacity: 0; }
        }

    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loader">
        <div class="spinner"></div>
        <p>加载中... Loading Book...</p>
    </div>

    <!-- Flipbook App -->
    <div id="flipbook-container">
        <div id="zoom-pan-container">
            <div id="flipbook"></div>
        </div>
    </div>

    <!-- Swipe Hint -->
    <div class="swipe-hint">左右滑动翻页 / Swipe to turn pages</div>

    <!-- Bottom Toolbar -->
    <div id="toolbar">
        <button class="btn" id="btn-prev" title="上一页">
            <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
        </button>
        <button class="btn" id="btn-zoom-out" title="缩小">
            <svg viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z"/></svg>
        </button>
        <button class="btn" id="btn-zoom-in" title="放大">
            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </button>
        <button class="btn" id="btn-next" title="下一页">
            <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
        </button>
    </div>

    <script>
        // --- Data: Local files for GitHub Pages ---
        const pagesData = [
            "page1.jpg", // Page 1 (Cover)
            "page2.jpg", // Page 2
            "page3.jpg", // Page 3
            "page4.jpg", // Page 4
            "page5.jpg", // Page 5
            "page6.jpg", // Page 6
            "page7.jpg", // Page 7
            "page8.jpg"  // Page 8 (Back Cover)
        ];

        // --- Group Pages into Leaves (Sheets) ---
        // Leaf 0: Front=Page 1, Back=Page 2
        // Leaf 1: Front=Page 3, Back=Page 4
        // Leaf 2: Front=Page 5, Back=Page 6
        // Leaf 3: Front=Page 7, Back=Page 8
        const leaves = [];
        for (let i = 0; i < pagesData.length; i += 2) {
            leaves.push({
                front: pagesData[i],
                back: (i + 1 < pagesData.length) ? pagesData[i + 1] : null
            });
        }

        // --- State ---
        let flippedCount = 0; // How many leaves have been turned
        let totalLeaves = leaves.length;
        let isZoomed = false;
        let zoomLevel = 1;
        let panX = 0;
        let panY = 0;
        
        // Dragging states
        let isPanning = false;
        let panStartX = 0;
        let panStartY = 0;

        // Touch Swipe states
        let touchStartX = 0;
        let touchStartY = 0;
        let touchStartTime = 0;

        // --- DOM Elements ---
        const flipbook = document.getElementById('flipbook');
        const zoomPanContainer = document.getElementById('zoom-pan-container');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const btnZoomIn = document.getElementById('btn-zoom-in');
        const btnZoomOut = document.getElementById('btn-zoom-out');
        const loader = document.getElementById('loader');

        // --- Initialization ---
        function init() {
            // Preload images
            let loadedCount = 0;
            pagesData.forEach(src => {
                const img = new Image();
                img.src = src;
                img.onload = () => {
                    loadedCount++;
                    if (loadedCount === pagesData.length) loader.classList.add('hidden');
                };
                img.onerror = () => {
                    loadedCount++;
                    if (loadedCount === pagesData.length) loader.classList.add('hidden');
                };
            });

            buildBook();
            attachEventListeners();
        }

        // --- Build Book DOM ---
        function buildBook() {
            flipbook.innerHTML = '';
            leaves.forEach((leafData, index) => {
                const leaf = document.createElement('div');
                leaf.className = 'leaf';
                leaf.dataset.index = index;

                const frontFace = document.createElement('div');
                frontFace.className = 'page-face front';
                frontFace.innerHTML = `<img src="${leafData.front}" alt="Page ${index * 2 + 1}">`;
                leaf.appendChild(frontFace);

                if (leafData.back) {
                    const backFace = document.createElement('div');
                    backFace.className = 'page-face back';
                    backFace.innerHTML = `<img src="${leafData.back}" alt="Page ${index * 2 + 2}">`;
                    leaf.appendChild(backFace);
                }

                flipbook.appendChild(leaf);
            });
            updateBook();
        }

        // --- Update Book State (Flipping Logic) ---
        function updateBook() {
            const leafElements = document.querySelectorAll('.leaf');
            leafElements.forEach((leaf, i) => {
                if (i < flippedCount) {
                    leaf.classList.add('flipped');
                    leaf.style.zIndex = i; // Flipped pages stack correctly
                } else {
                    leaf.classList.remove('flipped');
                    leaf.style.zIndex = totalLeaves - i; // Unflipped pages stack correctly
                }
            });
            updateNavigation();
        }

        function updateNavigation() {
            btnPrev.disabled = flippedCount === 0;
            btnNext.disabled = flippedCount === totalLeaves;
        }

        // --- Page Turning Logic ---
        function nextPage() {
            if (flippedCount < totalLeaves) {
                if (isZoomed) resetZoom();
                flippedCount++;
                updateBook();
            }
        }

        function prevPage() {
            if (flippedCount > 0) {
                if (isZoomed) resetZoom();
                flippedCount--;
                updateBook();
            }
        }

        // --- Zoom & Pan Logic ---
        function zoomIn() {
            if (!isZoomed) {
                isZoomed = true;
                zoomPanContainer.classList.add('zoomed');
            }
            zoomLevel += 0.5;
            if (zoomLevel > 3) zoomLevel = 3;
            applyTransform();
        }

        function zoomOut() {
            if (isZoomed) {
                zoomLevel -= 0.5;
                if (zoomLevel <= 1) {
                    resetZoom();
                } else {
                    applyTransform();
                }
            }
        }

        function resetZoom() {
            isZoomed = false;
            zoomLevel = 1;
            panX = 0;
            panY = 0;
            zoomPanContainer.classList.remove('zoomed');
            applyTransform();
        }

        function applyTransform() {
            zoomPanContainer.style.transform = `translate(${panX}px, ${panY}px) scale(${zoomLevel})`;
        }

        // --- Event Listeners ---
        function attachEventListeners() {
            // Button Clicks
            btnPrev.addEventListener('click', prevPage);
            btnNext.addEventListener('click', nextPage);
            btnZoomIn.addEventListener('click', zoomIn);
            btnZoomOut.addEventListener('click', zoomOut);

            // --- Mouse Events (Desktop Panning Only) ---
            zoomPanContainer.addEventListener('mousedown', (e) => {
                if (isZoomed) {
                    isPanning = true;
                    panStartX = e.clientX;
                    panStartY = e.clientY;
                    zoomPanContainer.classList.add('dragging');
                    e.preventDefault();
                }
            });

            window.addEventListener('mousemove', (e) => {
                if (isZoomed && isPanning) {
                    let dx = e.clientX - panStartX;
                    let dy = e.clientY - panStartY;
                    panX += dx;
                    panY += dy;
                    panStartX = e.clientX;
                    panStartY = e.clientY;
                    applyTransform();
                }
            });

            window.addEventListener('mouseup', () => {
                if (isPanning) {
                    isPanning = false;
                    zoomPanContainer.classList.remove('dragging');
                }
            });

            // --- Touch Events (Mobile Panning + Swiping) ---
            zoomPanContainer.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                    touchStartTime = Date.now();

                    if (isZoomed) {
                        isPanning = true;
                        panStartX = touchStartX;
                        panStartY = touchStartY;
                        zoomPanContainer.classList.add('dragging');
                        e.preventDefault(); // Prevent scroll
                    }
                }
            }, { passive: false });

            zoomPanContainer.addEventListener('touchmove', (e) => {
                if (e.touches.length === 1) {
                    let currentX = e.touches[0].clientX;
                    let currentY = e.touches[0].clientY;

                    if (isZoomed && isPanning) {
                        let dx = currentX - panStartX;
                        let dy = currentY - panStartY;
                        panX += dx;
                        panY += dy;
                        panStartX = currentX;
                        panStartY = currentY;
                        applyTransform();
                        e.preventDefault(); // Prevent scroll
                    }
                }
            }, { passive: false });

            zoomPanContainer.addEventListener('touchend', (e) => {
                if (isZoomed && isPanning) {
                    isPanning = false;
                    zoomPanContainer.classList.remove('dragging');
                    return; // Do not process swipe if we were panning
                }

                if (e.changedTouches.length === 1) {
                    let touchEndX = e.changedTouches[0].clientX;
                    let touchEndY = e.changedTouches[0].clientY;
                    let dx = touchEndX - touchStartX;
                    let dy = touchEndY - touchStartY;
                    let elapsedTime = Date.now() - touchStartTime;

                    // Strict swipe detection: horizontal, >50px, faster than 500ms
                    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 2 && elapsedTime < 500) {
                        if (dx < 0) {
                            nextPage();
                        } else {
                            prevPage();
                        }
                    }
                }
            });
        }

        // Start the app
        init();

    </script>
</body>
</html>
